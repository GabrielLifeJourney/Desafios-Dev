<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!--Aqui vai as imgs na Css.-->
            </div>
            <div id="formulario">
                <h1>Bem-vindo! 👋</h1>
                <p>Faça login para acessar sua conta e continuar sua experiência com segurança.</p>
                <form action="login.php" method="post" autocomplete="on">  
                    <div class="campo">
                        <i><span class="material-symbols-outlined">contact_mail</span></i>
                        <input type="email" name="login" id="ilog" placeholder="seu e-mail" autocomplete="email" required maxlength="30">
                        <label for="ilog">Login :</label>
                    </div>
                    <div class="campo">
                        <i><span class="material-symbols-outlined">contact_emergency</span></i>
                        <input type="password" name="senha" id="isen" placeholder="sua senha" autocomplete="current-password" required maxlength="20" minlength="8">
                        <label for="isen">Senha :</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="#" class="botao">
                        Esqueci a Senha <i><span class="material-symbols-outlined">lock_person</span></i>
                    </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
